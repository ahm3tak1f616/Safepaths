name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup JDK 21
        uses: actions/setup-java@8df1039f650269edb4d16fe02a0a3aefdf92878b # v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a50835b0829212d10526644023ee0 # v4.3.0

      - name: Build with Gradle
        run: ./gradlew build
